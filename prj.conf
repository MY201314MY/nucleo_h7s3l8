# MAIN
CONFIG_MAIN_STACK_SIZE=4096

# LOG
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# TRACE
# CONFIG_TRACING=y

# SEGGER
# https://blog.golioth.io/taking-the-next-step-debugging-with-segger-ozone-and-systemview-on-zephyr/
# CONFIG_USE_SEGGER_RTT=y
# CONFIG_SEGGER_SYSTEMVIEW=y

# GPIO
CONFIG_GPIO=y

# SHELL
CONFIG_SHELL=y
CONFIG_GPIO_SHELL=y
CONFIG_SHELL_STACK_SIZE=20480
CONFIG_SHELL_PROMPT_UART="inspiron:~$ "

# REBOOT
CONFIG_REBOOT=y

# HEAP
CONFIG_HEAP_MEM_POOL_SIZE=10240
CONFIG_SYS_HEAP_RUNTIME_STATS=y

# WORKQ
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=10240

# RANDOM
CONFIG_ENTROPY_GENERATOR=y

# ETH
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_ETHERNET_MGMT=y
CONFIG_ETHERNET_LOG_LEVEL_DBG=y

# POSIX
CONFIG_POSIX_API=y
CONFIG_POSIX_NETWORKING=y

# NETWORK
CONFIG_NETWORKING=y
CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_BUF_DATA_SIZE=2048

CONFIG_NET_SHELL=y
CONFIG_NET_IPV4_PMTU=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_MGMT_EVENT_STACK_SIZE=1024
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=5

CONFIG_NET_LOG=y
CONFIG_NET_PKT_LOG_LEVEL_ERR=y

# IP
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_ARP=y
CONFIG_NET_TCP_INIT_RETRANSMISSION_TIMEOUT=1000

# DHCPv4
CONFIG_NET_DHCPV4=y

# DNS
CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_DNS_TIMEOUT=32000
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"
CONFIG_DNS_RESOLVER_AI_MAX_ENTRIES=8

# SOCKET
CONFIG_NET_SOCKETS=y
CONFIG_NET_MAX_CONTEXTS=3
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=3
CONFIG_NET_CONTEXT_SNDTIMEO=y
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_NET_SOCKETS_TLS_CONNECT_TIMEOUT=8000

# CORE
CONFIG_OBJ_CORE=y
CONFIG_NET_SOCKETS_OBJ_CORE=y

# SNTP
CONFIG_SNTP=y
CONFIG_SNTP_LOG_LEVEL_DBG=y

# HTTP CLIENT
CONFIG_HTTP_CLIENT=y
CONFIG_NET_HTTP_LOG_LEVEL_INF=y

# MQTT
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_KEEPALIVE=60

# JSON
CONFIG_JSON_LIBRARY=y

# Mbed-TLS
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_RSA_C=y
CONFIG_MBEDTLS_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_DEBUG=y
CONFIG_MBEDTLS_LOG_LEVEL_DBG=y
CONFIG_MBEDTLS_MEMORY_DEBUG=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=81920
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=8192
CONFIG_MBEDTLS_PEM_CERTIFICATE_FORMAT=y
CONFIG_MBEDTLS_SHA1=y
CONFIG_MBEDTLS_SHA224=y
CONFIG_MBEDTLS_SHA256=y
CONFIG_MBEDTLS_SHA384=y
CONFIG_MBEDTLS_SHA512=y
CONFIG_MBEDTLS_CIPHER_GCM_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_RSA_PSK_ENABLED=y

# CRET
CONFIG_TLS_CREDENTIALS=y
CONFIG_TLS_CREDENTIALS_BACKEND_VOLATILE=y

# ECDSA
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_MBEDTLS_ENTROPY_C=y
CONFIG_MBEDTLS_ECP_DP_SECP192R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y

# ECDHE
CONFIG_MBEDTLS_ECDH_C=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_PSK_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDH_ECDSA_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_RSA_ENABLED=y

