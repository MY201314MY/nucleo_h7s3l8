# LOG
CONFIG_LOG=y
# CONFIG_LOG_MODE_IMMEDIATE=y

# GPIO
CONFIG_GPIO=y

# I2C
CONFIG_I2C=y

# SPI
CONFIG_SPI=y

# PWM
CONFIG_PWM=y
CONFIG_PWM_SHELL=y
CONFIG_PWM_LOG_LEVEL_DBG=y

# SHELL
CONFIG_SHELL=y
CONFIG_SPI_SHELL=y
CONFIG_GPIO_SHELL=y
CONFIG_I2C_SHELL=y
CONFIG_SHELL_STACK_SIZE=20480
CONFIG_SHELL_PROMPT_UART="inspiron:~$ "

# REBOOT
CONFIG_REBOOT=y

# FPU
CONFIG_FPU=y

# ST TEMP SENSOR
CONFIG_SENSOR=y
CONFIG_STM32_TEMP=y

# CAN
CONFIG_CAN=y
CONFIG_CAN_SHELL=y
CONFIG_CAN_FD_MODE=y
CONFIG_CAN_MANUAL_RECOVERY_MODE=y
CONFIG_CAN_DEFAULT_BITRATE=1000000
CONFIG_CAN_LOG_LEVEL_DBG=y

# HEAP
CONFIG_HEAP_MEM_POOL_SIZE=65536
CONFIG_SYS_HEAP_RUNTIME_STATS=y


# RANDOM
CONFIG_ENTROPY_GENERATOR=y

# NETWORK
CONFIG_NET_SHELL=y
CONFIG_NETWORKING=y
CONFIG_NET_IPV4_PMTU=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_ETHERNET_MGMT=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_ETHERNET_LOG_LEVEL_DBG=y
CONFIG_NET_MGMT_EVENT_STACK_SIZE=1024
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=5

# IP
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_ARP=y

# DHCPv4
CONFIG_NET_DHCPV4=y

# DNS
CONFIG_DNS_RESOLVER=y
CONFIG_NET_SOCKETS_DNS_TIMEOUT=8000
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"

# SOCKET
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_OBJ_CORE=y
CONFIG_NET_SOCKETS_OBJ_CORE=y

# POSIX
CONFIG_POSIX_API=y

# SNTP
CONFIG_SNTP=y
CONFIG_SNTP_LOG_LEVEL_DBG=y

# HTTP CLIENT
CONFIG_HTTP_CLIENT=y
CONFIG_NET_HTTP_LOG_LEVEL_INF=y

# Mbed-TLS
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_DEBUG=y
CONFIG_MBEDTLS_LOG_LEVEL_ERR=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=81920
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=16384
CONFIG_MBEDTLS_PEM_CERTIFICATE_FORMAT=y
CONFIG_MBEDTLS_SHA1=y
CONFIG_MBEDTLS_SHA384=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_RSA_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP192R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP224R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP521R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP192K1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP224K1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_SECP256K1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_BP256R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_BP384R1_ENABLED=y
CONFIG_MBEDTLS_ECP_DP_BP512R1_ENABLED=y
CONFIG_MBEDTLS_ECDH_C=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_MBEDTLS_CIPHER_GCM_ENABLED=y

