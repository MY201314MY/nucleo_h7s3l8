# MAIN
CONFIG_MAIN_STACK_SIZE=4096

# LOG
CONFIG_LOG=y
CONFIG_LOG_BUFFER_SIZE=4096

# GPIO
CONFIG_GPIO=y

# I2C
CONFIG_I2C=y

# SPI
CONFIG_SPI=y

# PWM
CONFIG_PWM=y
CONFIG_PWM_SHELL=y
CONFIG_PWM_LOG_LEVEL_DBG=y

# RTC
CONFIG_RTC=y
CONFIG_RTC_LOG_LEVEL_DBG=y
CONFIG_RTC_SHELL=y

# HWINFO
CONFIG_HWINFO=y
CONFIG_HWINFO_SHELL=y

# BBRAM
CONFIG_BBRAM=y
CONFIG_BBRAM_SHELL=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# SHELL
CONFIG_SHELL=y
CONFIG_SPI_SHELL=y
CONFIG_GPIO_SHELL=y
CONFIG_I2C_SHELL=y
CONFIG_SHELL_STACK_SIZE=4096
CONFIG_SHELL_PROMPT_UART="inspiron:~$ "

# REBOOT
CONFIG_REBOOT=y

# FPU
# CNN  --> FPU     -->
# 1007 --> 1044(X) --> 736
# CONFIG_FPU=y
# CONFIG_SPEED_OPTIMIZATIONS=y

# ST TEMP SENSOR
CONFIG_SENSOR=y
CONFIG_STM32_TEMP=y

# CAN
CONFIG_CAN=y
CONFIG_CAN_SHELL=y
CONFIG_CAN_FD_MODE=y
CONFIG_CAN_MANUAL_RECOVERY_MODE=y
CONFIG_CAN_DEFAULT_BITRATE=1000000
CONFIG_CAN_LOG_LEVEL_DBG=y

# HEAP
CONFIG_HEAP_MEM_POOL_SIZE=10240
CONFIG_SYS_HEAP_RUNTIME_STATS=y


# RANDOM
CONFIG_ENTROPY_GENERATOR=y

# JSON
CONFIG_JSON_LIBRARY=y

# C++
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_MAIN_STACK_SIZE=4096

CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_CBPRINTF_FP_SUPPORT=y

